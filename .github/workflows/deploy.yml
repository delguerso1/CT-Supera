name: Deploy CT Supera to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite execução manual

jobs:
  test:
    name: Testes e Validações
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar migrações
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: app.settings
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Verificar configuração Django
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: app.settings
        run: |
          python manage.py check

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: ct-supera-frontend/package-lock.json

      - name: Instalar dependências Node.js
        working-directory: ./ct-supera-frontend
        run: npm ci

      - name: Verificar erros de lint (Frontend)
        working-directory: ./ct-supera-frontend
        run: npm run build
        continue-on-error: true

  build-frontend:
    name: Build do Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: ct-supera-frontend/package-lock.json

      - name: Instalar dependências
        working-directory: ./ct-supera-frontend
        run: npm ci

      - name: Build da aplicação
        working-directory: ./ct-supera-frontend
        run: npm run build

      - name: Upload do build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ct-supera-frontend/build/
          retention-days: 1

  deploy:
    name: Deploy para Produção
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ctsupera.com.br
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Download do build do frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ct-supera-frontend/build/

      - name: Configurar SSH
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H ${{ secrets.HOST }} >> "$HOME/.ssh/known_hosts"

      - name: Criar backup no servidor
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            cd /root
            mkdir -p backups
            timestamp=$(date +%Y%m%d-%H%M%S)
            tar -czf backups/ct-supera-backup-$timestamp.tar.gz ct-supera/
            # Manter apenas os últimos 10 backups
            cd backups
            ls -t ct-supera-backup-*.tar.gz | tail -n +11 | xargs -r rm
            echo "✅ Backup criado: ct-supera-backup-$timestamp.tar.gz"
          EOF

      - name: Sincronizar código Backend
        run: |
          rsync -avz --delete \
            --exclude 'venv/' \
            --exclude 'node_modules/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.git/' \
            --exclude 'ct-supera-frontend/build/' \
            --exclude 'ct-supera-frontend/node_modules/' \
            --exclude 'staticfiles/' \
            --exclude 'media/' \
            --exclude 'db.sqlite3' \
            --exclude '.env' \
            --exclude 'logs/' \
            --exclude 'backups/' \
            --exclude 'certificados/' \
            --exclude '*.tar.gz' \
            --exclude '*.zip' \
            --exclude '*.key' \
            --exclude '*.pem' \
            --exclude '*.crt' \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/root/ct-supera/

      - name: Sincronizar Frontend Build
        run: |
          rsync -avz --delete \
            ct-supera-frontend/build/ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/root/ct-supera/ct-supera-frontend/build/

      - name: Configurar cron (mensalidades e lembretes aula experimental)
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            chmod +x /root/ct-supera/scripts/gerar_mensalidades.sh 2>/dev/null || true
            mkdir -p /root/ct-supera/logs
            ( crontab -l 2>/dev/null | grep -v gerar_mensalidades.sh | grep -v enviar_lembretes_aula_experimental
              echo "5 0 * * * cd /root/ct-supera && VENV_PATH=/root/ct-supera/venv DJANGO_SETTINGS_MODULE=app.settings_hostinger /root/ct-supera/scripts/gerar_mensalidades.sh >> /root/ct-supera/logs/gerar_mensalidades.log 2>&1"
              echo "0 9 * * * cd /root/ct-supera && DJANGO_SETTINGS_MODULE=app.settings_hostinger /root/ct-supera/venv/bin/python manage.py enviar_lembretes_aula_experimental"
            ) | crontab -
          EOF

      - name: Executar deploy no servidor
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e
            cd /root/ct-supera
            
            echo "📦 Ativando ambiente virtual..."
            source venv/bin/activate
            
            echo "📦 Instalando/atualizando dependências..."
            pip install -r requirements.txt --quiet
            
            echo "🗄️ Executando migrações..."
            python manage.py migrate --settings=app.settings_hostinger --noinput
            
            echo "📁 Coletando arquivos estáticos..."
            python manage.py collectstatic --settings=app.settings_hostinger --noinput
            
            echo "🌐 Atualizando configuração do Nginx..."
            if [ -f "nginx_hostinger.conf" ]; then
              sudo cp nginx_hostinger.conf /etc/nginx/sites-available/ctsupera
              sudo ln -sf /etc/nginx/sites-available/ctsupera /etc/nginx/sites-enabled/
              
              # Verificar se certificado SSL existe, se não, comentar bloco HTTPS
              if [ ! -f "/etc/letsencrypt/live/ctsupera.com.br/fullchain.pem" ]; then
                echo "⚠️ Certificado SSL não encontrado. Comentando configuração HTTPS..."
                sudo sed -i 's/^server {$/## server {/g' /etc/nginx/sites-available/ctsupera
                sudo sed -i '/listen 443 ssl http2;/,/^}$/s/^/#/g' /etc/nginx/sites-available/ctsupera
                sudo sed -i '/return 301 https:/s/^/#/g' /etc/nginx/sites-available/ctsupera
              fi
              
              sudo nginx -t && sudo systemctl reload nginx || echo "⚠️ Erro ao atualizar Nginx"
            fi
            
            echo "🔄 Reiniciando serviço..."
            sudo systemctl restart ctsupera
            
            echo "⏳ Aguardando serviço iniciar..."
            sleep 5
            
            echo "🏥 Verificando saúde da aplicação..."
            # Verificar se o serviço está ativo
            if ! sudo systemctl is-active --quiet ctsupera; then
              echo "❌ Erro: Serviço ctsupera não está rodando!"
              sudo systemctl status ctsupera --no-pager -l
              exit 1
            fi
            
            # Verificar se a aplicação responde (timeout de 30s)
            max_attempts=10
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if curl -f -s -o /dev/null http://localhost:8001/api/status/ || curl -f -s -o /dev/null https://ctsupera.com.br/api/status/; then
                echo "✅ Aplicação respondendo corretamente!"
                break
              fi
              attempt=$((attempt + 1))
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Erro: Aplicação não responde após $max_attempts tentativas!"
                exit 1
              fi
              echo "⏳ Tentativa $attempt/$max_attempts... aguardando..."
              sleep 3
            done
            
            echo "✅ Deploy concluído com sucesso!"
          EOF

      - name: Verificar status do serviço
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            echo "📊 Status dos serviços:"
            echo ""
            echo "=== Aplicação Django ==="
            sudo systemctl status ctsupera --no-pager -l | head -15
            echo ""
            echo "=== Nginx ==="
            sudo systemctl status nginx --no-pager -l | head -10
            echo ""
            echo "=== PostgreSQL ==="
            sudo systemctl status postgresql --no-pager -l | head -10
          EOF

      - name: Notificar sucesso
        if: success()
        run: |
          echo "🎉 Deploy realizado com sucesso!"
          echo "🌐 Aplicação disponível em: https://ctsupera.com.br"
          echo "⏰ Horário: $(date)"

      - name: Rollback em caso de falha
        if: failure()
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            echo "❌ Deploy falhou! Iniciando rollback..."
            cd /root/backups
            latest_backup=$(ls -t ct-supera-backup-*.tar.gz | head -1)
            if [ -n "$latest_backup" ]; then
              echo "📦 Restaurando backup: $latest_backup"
              cd /root
              rm -rf ct-supera.old
              mv ct-supera ct-supera.old
              tar -xzf backups/$latest_backup
              sudo systemctl restart ctsupera
              echo "✅ Rollback concluído!"
            else
              echo "⚠️ Nenhum backup encontrado!"
            fi
          EOF

  notify:
    name: Notificação
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verificar resultado
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy realizado com sucesso!"
          else
            echo "❌ Deploy falhou!"
            exit 1
          fi

